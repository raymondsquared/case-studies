name: Deploy Infrastructure

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  AWS_REGION: 'ap-southeast-2'

jobs:
  # Security and validation checks
  security:
    name: Security & Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd kubernetes/terraform
          npm ci

      - name: Setup Terraform
        run: |
          cd kubernetes/terraform
          make setup

      - name: Validate configuration
        run: |
          cd kubernetes/terraform
          make validate-all
        env:
          ENVIRONMENT: dev
          TERRAFORM_ORGANISATION: ${{ secrets.TERRAFORM_ORGANISATION }}
          TERRAFORM_WORKSPACE: ${{ secrets.TERRAFORM_WORKSPACE_DEV }}

      - name: Run tests
        run: |
          cd kubernetes/terraform
          npm test

      - name: Security scan
        run: |
          cd kubernetes/terraform
          make security-scan
        env:
          SECURITY_SCAN: true

      - name: Cost analysis
        run: |
          cd kubernetes/terraform
          make cost-analysis
        env:
          COST_ANALYSIS: true

  # Deploy to development environment
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: security
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    environment: development
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: |
          cd kubernetes/terraform
          npm ci

      - name: Setup Terraform
        run: |
          cd kubernetes/terraform
          make setup

      - name: Deploy to development
        run: |
          cd kubernetes/terraform
          make dev
        env:
          ENVIRONMENT: dev
          TERRAFORM_ORGANISATION: ${{ secrets.TERRAFORM_ORGANISATION }}
          TERRAFORM_WORKSPACE: ${{ secrets.TERRAFORM_WORKSPACE_DEV }}
          TERRAFORM_HOSTNAME: ${{ secrets.TERRAFORM_HOSTNAME }}
          AWS_PROFILE: default

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Development deployment successful"
          # Add notification logic here (Slack, Teams, etc.)

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Development deployment failed"
          # Add notification logic here (Slack, Teams, etc.)

  # Deploy to staging environment
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [security, deploy-dev]
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: |
          cd kubernetes/terraform
          npm ci

      - name: Setup Terraform
        run: |
          cd kubernetes/terraform
          make setup

      - name: Deploy to staging
        run: |
          cd kubernetes/terraform
          make staging
        env:
          ENVIRONMENT: staging
          TERRAFORM_ORGANISATION: ${{ secrets.TERRAFORM_ORGANISATION }}
          TERRAFORM_WORKSPACE: ${{ secrets.TERRAFORM_WORKSPACE_STAGING }}
          TERRAFORM_HOSTNAME: ${{ secrets.TERRAFORM_HOSTNAME }}
          AWS_PROFILE: default

      - name: Run integration tests
        run: |
          cd kubernetes/terraform
          npm run test:integration
        env:
          ENVIRONMENT: staging

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Staging deployment successful"
          # Add notification logic here

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Staging deployment failed"
          # Add notification logic here

  # Deploy to production environment
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [security, deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: |
          cd kubernetes/terraform
          npm ci

      - name: Setup Terraform
        run: |
          cd kubernetes/terraform
          make setup

      - name: Final security check
        run: |
          cd kubernetes/terraform
          make security-check
        env:
          SECURITY_SCAN: true
          COST_ANALYSIS: true

      - name: Deploy to production
        run: |
          cd kubernetes/terraform
          make prod
        env:
          ENVIRONMENT: prod
          TERRAFORM_ORGANISATION: ${{ secrets.TERRAFORM_ORGANISATION }}
          TERRAFORM_WORKSPACE: ${{ secrets.TERRAFORM_WORKSPACE_PROD }}
          TERRAFORM_HOSTNAME: ${{ secrets.TERRAFORM_HOSTNAME }}
          AWS_PROFILE: default

      - name: Run smoke tests
        run: |
          cd kubernetes/terraform
          npm run test:smoke
        env:
          ENVIRONMENT: prod

      - name: Notify production deployment
        run: |
          echo "🚀 Production deployment completed successfully!"
          # Add notification logic here (Slack, Teams, etc.)

  # Post-deployment monitoring
  monitor:
    name: Post-Deployment Monitoring
    runs-on: ubuntu-latest
    needs: [deploy-prod]
    if: github.ref == 'refs/heads/main' && always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: |
          cd kubernetes/terraform
          npm ci

      - name: Health check
        run: |
          cd kubernetes/terraform
          npm run health-check
        env:
          ENVIRONMENT: prod

      - name: Performance check
        run: |
          cd kubernetes/terraform
          npm run performance-check
        env:
          ENVIRONMENT: prod

      - name: Notify monitoring results
        run: |
          echo "📊 Post-deployment monitoring completed"
          # Add notification logic here 